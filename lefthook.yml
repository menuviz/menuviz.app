# Local quality gate. Installed automatically when you enter the nix dev shell
# (`lefthook install` in shell.nix). Bypass in an emergency with `--no-verify`.

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc,css,md,yml,yaml,html,nix}"
      # treefmt lives in the nix dev shell. Outside it, skip with a warning
      # rather than hard-fail — CI's format job is the hard gate.
      run: >
        if command -v treefmt >/dev/null 2>&1; then treefmt {staged_files};
        else echo "⚠ treefmt not found — run inside 'nix develop'; skipping format";
        fi
      stage_fixed: true
    lint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: bunx eslint --no-warn-ignored {staged_files}

pre-push:
  parallel: false
  commands:
    type-check:
      run: bun run type-check
    build:
      run: bun run build
